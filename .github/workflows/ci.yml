name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout bms-editor
        uses: actions/checkout@v4
        with:
          path: bms-editor

      - name: Checkout bms-core (sibling workspace dep)
        uses: actions/checkout@v4
        with:
          repository: dotoritos-kim/bms-core
          token: ${{ secrets.WORKSPACE_REPO_TOKEN || github.token }}
          path: bms-core
        continue-on-error: true

      - name: Checkout bms-player (sibling workspace dep)
        uses: actions/checkout@v4
        with:
          repository: dotoritos-kim/bms-player
          token: ${{ secrets.WORKSPACE_REPO_TOKEN || github.token }}
          path: bms-player
        continue-on-error: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Build bms-core
        if: hashFiles('bms-core/package.json') != ''
        working-directory: bms-core
        run: |
          npm ci || npm install
          npm run build

      - name: Build bms-player
        if: hashFiles('bms-player/package.json') != ''
        working-directory: bms-player
        run: |
          npm ci || npm install
          npm run build

      - name: Install bms-editor dependencies
        working-directory: bms-editor
        run: npm ci || npm install

      - name: Type check
        working-directory: bms-editor
        run: npx tsc --noEmit

      - name: Build
        working-directory: bms-editor
        run: npm run build

      - name: Test
        working-directory: bms-editor
        run: npm test
